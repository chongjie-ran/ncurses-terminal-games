<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake - WASM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  #hud {
    font-size: 18px;
    margin-bottom: 8px;
    letter-spacing: 2px;
    color: #0f0;
  }
  canvas {
    border: 2px solid #0a0;
    display: block;
  }
  #hint {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
  }
</style>
</head>
<body>
<div id="hud">SCORE: <span id="score">0</span> | SPEED: <span id="speed">1</span></div>
<canvas id="c"></canvas>
<div id="hint">WASD / Arrows: Move | Space/P: Pause | Enter: Start | R: Restart</div>

<script>
const CELL = 24;
const GRID_W = 20;
const GRID_H = 15;
const W = GRID_W * CELL;
const H = GRID_H * CELL;

const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

const scoreEl = document.getElementById('score');
const speedEl = document.getElementById('speed');

const STATE_MENU = 0, STATE_PLAYING = 1, STATE_PAUSED = 2, STATE_GAME_OVER = 3;
const DIR_UP = 0, DIR_DOWN = 1, DIR_LEFT = 2, DIR_RIGHT = 3;

// WASM module (set after load)
let mod = null;

// Colors
const COLORS = {
  bg: '#0a0a0a',
  grid: '#0f1f0f',
  snakeHead: '#00ff00',
  snakeBody: '#00cc44',
  snakeTail: '#009933',
  food: '#ff4444',
  border: '#00aa00',
};

function drawGrid() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= GRID_W; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, H);
    ctx.stroke();
  }
  for (let y = 0; y <= GRID_H; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(W, y * CELL);
    ctx.stroke();
  }
}

function drawSnakeSegment(x, y, isHead, index, len) {
  const px = x * CELL;
  const py = y * CELL;
  const pad = 1;
  
  // Color gradient from head to tail
  let color;
  if (isHead) {
    color = COLORS.snakeHead;
  } else {
    const t = index / Math.max(len - 1, 1);
    const r = Math.round(0 + t * 0);
    const g = Math.round(204 - t * 51);
    const b = Math.round(68 - t * 17);
    color = `rgb(${r},${g},${b})`;
  }
  
  ctx.fillStyle = color;
  ctx.fillRect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2);
  
  // Eyes on head
  if (isHead) {
    ctx.fillStyle = '#000';
    const eyeSize = 3;
    const dir = mod ? mod.ccall('wasm_get_state_game', 'number') : 0;
    // Simple eye positions based on direction
    let ex1, ey1, ex2, ey2;
    const cx = px + CELL / 2;
    const cy = py + CELL / 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - 4, cy - 3, eyeSize, 0, Math.PI * 2);
    ctx.arc(cx + 4, cy - 3, eyeSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cx - 4, cy - 3, 1.5, 0, Math.PI * 2);
    ctx.arc(cx + 4, cy - 3, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFood(x, y) {
  const px = x * CELL + CELL / 2;
  const py = y * CELL + CELL / 2;
  const r = CELL / 2 - 2;
  
  // Pulsing effect
  const pulse = Math.sin(Date.now() / 200) * 2;
  
  ctx.fillStyle = COLORS.food;
  ctx.beginPath();
  ctx.arc(px, py, r + pulse, 0, Math.PI * 2);
  ctx.fill();
  
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(px - 3, py - 3, r / 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawText(text, subtext) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  
  ctx.fillStyle = '#0f0';
  ctx.font = 'bold 28px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(text, W / 2, H / 2 - 20);
  
  if (subtext) {
    ctx.font = '14px Courier New';
    ctx.fillStyle = '#0a0';
    ctx.fillText(subtext, W / 2, H / 2 + 20);
  }
}

function render(state, snake_len, food_x, food_y, score, speed) {
  drawGrid();
  
  // Draw food
  if (food_x >= 0 && food_y >= 0) {
    drawFood(food_x, food_y);
  }
  
  // Draw snake (back to front so head is on top)
  for (let i = snake_len - 1; i >= 0; i--) {
    const sx = mod.ccall('wasm_get_snake_x_game', 'number', ['number'], [i]);
    const sy = mod.ccall('wasm_get_snake_y_game', 'number', ['number'], [i]);
    drawSnakeSegment(sx, sy, i === 0, i, snake_len);
  }
  
  // Draw state overlays
  if (state === STATE_MENU) {
    drawText('🐍 SNAKE', 'Press ENTER or click to start');
  } else if (state === STATE_PAUSED) {
    drawText('PAUSED', 'Press P or Space to resume');
  } else if (state === STATE_GAME_OVER) {
    drawText('GAME OVER', `Score: ${score}  |  Press R to restart`);
  }
  
  // Update HUD
  scoreEl.textContent = score;
  speedEl.textContent = speed;
}

function gameLoop() {
  if (!mod) return;
  
  mod.ccall('wasm_tick_game');
  
  const state = mod.ccall('wasm_get_state_game', 'number');
  const score = mod.ccall('wasm_get_score_game', 'number');
  const speed = mod.ccall('wasm_get_speed_game', 'number');
  const snake_len = mod.ccall('wasm_get_snake_len_game', 'number');
  const food_x = mod.ccall('wasm_get_food_x_game', 'number');
  const food_y = mod.ccall('wasm_get_food_y_game', 'number');
  
  render(state, snake_len, food_x, food_y, score, speed);
  requestAnimationFrame(gameLoop);
}

// Input
document.addEventListener('keydown', (e) => {
  if (!mod) return;
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': mod.ccall('wasm_set_dir_game', null, ['number'], [DIR_UP]);    e.preventDefault(); break;
    case 'ArrowDown':  case 's': case 'S': mod.ccall('wasm_set_dir_game', null, ['number'], [DIR_DOWN]);  e.preventDefault(); break;
    case 'ArrowLeft':  case 'a': case 'A': mod.ccall('wasm_set_dir_game', null, ['number'], [DIR_LEFT]);  e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': mod.ccall('wasm_set_dir_game', null, ['number'], [DIR_RIGHT]); e.preventDefault(); break;
    case ' ': case 'p': case 'P': mod.ccall('wasm_toggle_pause_game'); e.preventDefault(); break;
    case 'r': case 'R': mod.ccall('wasm_restart_game'); break;
    case 'Enter': {
      const st = mod.ccall('wasm_get_state_game', 'number');
      if (st === STATE_MENU || st === STATE_GAME_OVER) mod.ccall('wasm_start_game');
      break;
    }
  }
});

canvas.addEventListener('click', () => {
  if (!mod) return;
  const st = mod.ccall('wasm_get_state_game', 'number');
  if (st === STATE_MENU || st === STATE_GAME_OVER) mod.ccall('wasm_start_game');
});

// Load WASM
var Module = {};
fetch('snake.wasm')
  .then(r => r.arrayBuffer())
  .then(buf => {
    WebAssembly.instantiate(buf, {})
      .then(({instance}) => {
        const exp = instance.exports;
        mod = {
          ccall: (name, ret, args, argv) => {
            const f = exp[name];
            if (!f) return 0;
            return Reflect.apply(f, null, argv || []);
          }
        };
        mod.ccall('wasm_init_game');
        requestAnimationFrame(gameLoop);
      });
  })
  .catch(e => console.error('WASM load failed:', e));
</script>
</body>
</html>
