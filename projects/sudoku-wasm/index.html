<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku WASM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #eee;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
h1 { color: #e2b714; font-size: 2rem; margin-bottom: 10px; letter-spacing: 2px; }
.info {
  display: flex;
  gap: 20px;
  margin-bottom: 12px;
  font-size: 0.9rem;
  color: #aaa;
}
.info span { color: #e2b714; font-weight: bold; }
#board {
  border: 3px solid #e2b714;
  cursor: pointer;
  display: block;
}
.controls {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 480px;
}
.num-btn {
  width: 44px; height: 44px;
  border: 2px solid #444;
  background: #16213e;
  color: #fff;
  font-size: 1.3rem;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.num-btn:hover { border-color: #e2b714; background: #1a1a4e; }
.num-btn:active { transform: scale(0.95); }
.action-btn {
  padding: 8px 16px;
  border: 2px solid #444;
  background: #16213e;
  color: #eee;
  font-size: 0.85rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.action-btn:hover { border-color: #e2b714; background: #1a1a4e; }
.action-btn.hint { color: #4ecdc4; border-color: #4ecdc4; }
.action-btn.solve { color: #a8e6cf; border-color: #a8e6cf; }
.action-btn.erase { color: #ff6b6b; border-color: #ff6b6b; }
.difficulty-btns {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.diff-btn {
  padding: 8px 18px;
  border: 2px solid #444;
  background: #16213e;
  color: #eee;
  font-size: 0.85rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.diff-btn:hover { border-color: #e2b714; }
.diff-btn.easy { color: #a8e6cf; border-color: #a8e6cf; }
.diff-btn.medium { color: #f7dc6f; border-color: #f7dc6f; }
.diff-btn.hard { color: #ff6b6b; border-color: #ff6b6b; }
.diff-btn.expert { color: #c39bd3; border-color: #c39bd3; }
#msg {
  margin-top: 10px;
  font-size: 1rem;
  min-height: 24px;
  color: #e2b714;
}
</style>
</head>
<body>
<h1>SUDOKU</h1>
<div class="info">
  <div>Difficulty: <span id="diffLabel">-</span></div>
  <div>Errors: <span id="errors">0</span></div>
  <div>Hints: <span id="hints">0</span></div>
  <div>Time: <span id="timer">0:00</span></div>
</div>
<canvas id="board" width="480" height="480"></canvas>
<div class="controls" id="numPad" style="display:none">
  <button class="num-btn" onclick="inputDigit(1)">1</button>
  <button class="num-btn" onclick="inputDigit(2)">2</button>
  <button class="num-btn" onclick="inputDigit(3)">3</button>
  <button class="num-btn" onclick="inputDigit(4)">4</button>
  <button class="num-btn" onclick="inputDigit(5)">5</button>
  <button class="num-btn" onclick="inputDigit(6)">6</button>
  <button class="num-btn" onclick="inputDigit(7)">7</button>
  <button class="num-btn" onclick="inputDigit(8)">8</button>
  <button class="num-btn" onclick="inputDigit(9)">9</button>
  <button class="action-btn erase" onclick="eraseCell()">✕</button>
</div>
<div class="difficulty-btns" id="diffBtns">
  <button class="diff-btn easy" onclick="startGame(0)">Easy</button>
  <button class="diff-btn medium" onclick="startGame(1)">Medium</button>
  <button class="diff-btn hard" onclick="startGame(2)">Hard</button>
  <button class="diff-btn expert" onclick="startGame(3)">Expert</button>
</div>
<div class="controls" id="actionBtns" style="display:none">
  <button class="action-btn" onclick="toggleCandidates()">Candidates</button>
  <button class="action-btn hint" onclick="giveHint()">Hint</button>
  <button class="action-btn solve" onclick="solvePuzzle()">Solve</button>
  <button class="action-btn" onclick="resetPuzzle()">Reset</button>
  <button class="action-btn" onclick="showMenu()">Menu</button>
</div>
<div id="msg"></div>

<script src="sudoku.js"></script>
<script>
const CELL = 480 / 9;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

let Module = {};
let timerInterval = null;
let startTime = 0;

const diffLabels = ['Easy', 'Medium', 'Hard', 'Expert'];

SudokuModule().then(m => {
  Module = m;
  window.sudokuReady = true;
});

function startGame(diff) {
  clearInterval(timerInterval);
  Module._sudoku_start_game(diff);
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  document.getElementById('diffBtns').style.display = 'none';
  document.getElementById('numPad').style.display = 'flex';
  document.getElementById('actionBtns').style.display = 'flex';
  document.getElementById('diffLabel').textContent = diffLabels[diff];
  document.getElementById('errors').textContent = '0';
  document.getElementById('hints').textContent = '0';
  document.getElementById('msg').textContent = '';
  render();
}

function showMenu() {
  clearInterval(timerInterval);
  document.getElementById('diffBtns').style.display = 'flex';
  document.getElementById('numPad').style.display = 'none';
  document.getElementById('actionBtns').style.display = 'none';
  document.getElementById('msg').textContent = '';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, 480, 480);
  ctx.fillStyle = '#e2b714';
  ctx.font = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Select Difficulty', 240, 230);
}

function updateTimer() {
  let elapsed = Math.floor((Date.now() - startTime) / 1000);
  let m = Math.floor(elapsed / 60);
  let s = elapsed % 60;
  document.getElementById('timer').textContent = m + ':' + String(s).padStart(2, '0');
  Module._sudoku_set_timer(elapsed);
}

function inputDigit(d) {
  Module._sudoku_input_digit(d);
  let errors = Module._sudoku_get_error_count();
  document.getElementById('errors').textContent = errors;
  checkState();
  render();
}

function eraseCell() {
  Module._sudoku_erase();
  render();
}

function toggleCandidates() {
  Module._sudoku_toggle_candidates();
  render();
}

function giveHint() {
  Module._sudoku_hint();
  let hints = Module._sudoku_get_hints_used();
  document.getElementById('hints').textContent = hints;
  checkState();
  render();
}

function solvePuzzle() {
  Module._sudoku_solve();
  checkState();
  render();
}

function resetPuzzle() {
  Module._sudoku_reset();
  document.getElementById('errors').textContent = '0';
  render();
}

function checkState() {
  let state = Module._sudoku_get_state();
  if (state === 3) { // SOLVED (state 3 = solved)
    document.getElementById('msg').textContent = '🎉 Sudoku Solved!';
    clearInterval(timerInterval);
  }
}

function render() {
  ctx.clearRect(0, 0, 480, 480);
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0, 0, 480, 480);

  // Draw cells
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      let x = c * CELL, y = r * CELL;
      let isFixed = Module._sudoku_get_fixed(r, c) === 1;
      let val = Module._sudoku_get_cell(r, c);
      let selR = Module._sudoku_get_selected_row();
      let selC = Module._sudoku_get_selected_col();
      let showCand = Module._sudoku_get_show_candidates() === 1;
      let candidates = Module._sudoku_get_candidates(r, c);

      // Background
      if (r === selR && c === selC) {
        ctx.fillStyle = '#3a3a6a';
      } else if ((Math.floor(r/3) + Math.floor(c/3)) % 2 === 0) {
        ctx.fillStyle = '#16213e';
      } else {
        ctx.fillStyle = '#1a1a3e';
      }
      ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);

      // Highlight same row/col/box
      if (r === selR || c === selC ||
          (Math.floor(r/3) === Math.floor(selR/3) && Math.floor(c/3) === Math.floor(selC/3))) {
        if (!(r === selR && c === selC)) {
          ctx.fillStyle = 'rgba(226,183,20,0.07)';
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
        }
      }

      // Draw value or candidates
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (val !== 0) {
        ctx.fillStyle = isFixed ? '#e2b714' : '#4ecdc4';
        ctx.font = 'bold 28px Arial';
        ctx.fillText(String(val), x + CELL / 2, y + CELL / 2);
      } else if (showCand && candidates !== 0) {
        ctx.fillStyle = '#666';
        ctx.font = '10px Arial';
        for (let d = 1; d <= 9; d++) {
          if (candidates & (1 << (d - 1))) {
            let dc = (d - 1) % 3;
            let dr = Math.floor((d - 1) / 3);
            ctx.fillText(String(d), x + CELL * 0.2 + dc * CELL * 0.33, y + CELL * 0.22 + dr * CELL * 0.33);
          }
        }
      }
    }
  }

  // Draw grid lines
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 9; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, 480);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(480, i * CELL);
    ctx.stroke();
  }
  // Thicker lines for boxes
  ctx.strokeStyle = '#e2b714';
  ctx.lineWidth = 2;
  for (let i = 0; i <= 9; i += 3) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, 480);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(480, i * CELL);
    ctx.stroke();
  }
}

canvas.addEventListener('click', e => {
  let rect = canvas.getBoundingClientRect();
  let scaleX = canvas.width / rect.width;
  let scaleY = canvas.height / rect.height;
  let x = (e.clientX - rect.left) * scaleX;
  let y = (e.clientY - rect.top) * scaleY;
  let col = Math.floor(x / CELL);
  let row = Math.floor(y / CELL);
  Module._sudoku_select_cell(row, col);
  render();
});

document.addEventListener('keydown', e => {
  let state = Module._sudoku_get_state();
  if (state !== 1) return; // only in playing state
  if (e.key >= '1' && e.key <= '9') {
    inputDigit(parseInt(e.key));
  } else if (e.key === 'Backspace' || e.key === 'Delete') {
    eraseCell();
  } else if (e.key === 'c' || e.key === 'C') {
    toggleCandidates();
  } else if (e.key === 'h' || e.key === 'H') {
    giveHint();
  }
});
</script>
</body>
</html>
