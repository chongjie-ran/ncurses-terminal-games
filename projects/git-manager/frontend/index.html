<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Git Project Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;padding:24px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:24px;margin-bottom:20px}
.toolbar{margin-bottom:16px;display:flex;gap:12px}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer}
.btn-primary{background:#1677ff;color:#fff}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-secondary{background:#fff;border:1px solid #d9d9d9}
.btn-sm{padding:4px 10px;font-size:12px}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:12px 16px;border-bottom:1px solid #f0f0f0}
th{background:#fafafa;font-weight:600}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px}
.status-idle{background:#f0f0f0}.status-running{background:#e6f4ff;color:#1677ff}
.status-success{background:#f6ffed;color:#52c41a}.status-failed{background:#fff2f0;color:#ff4d4f}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);justify-content:center;align-items:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:8px;width:500px;max-height:90vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid #f0f0f0;font-weight:600;display:flex;justify-content:space-between}
.modal-body{padding:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;margin-bottom:4px;font-size:13px}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px}
.modal-footer{padding:12px 20px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:8px}
.log-panel{background:#1e1e1e;color:#d4d4d4;border-radius:6px;padding:12px;font-family:monospace;font-size:12px;max-height:150px;overflow-y:auto;margin-top:16px;display:none}
.log-panel.show{display:block}
.empty{text-align:center;padding:48px;color:#999}
.actions{display:flex;gap:6px}
</style>
</head>
<body>
<div class="container">
<h1>Git Project Manager</h1>
<div class="toolbar">
<button class="btn btn-primary" id="btn-add">+ New Project</button>
<button class="btn btn-secondary" id="btn-refresh">Refresh</button>
</div>
<div class="card">
<table>
<thead><tr><th>Name</th><th>Repo</th><th>Branch</th><th>Path</th><th>Status</th><th>Last Pull</th><th>Actions</th></tr></thead>
<tbody id="list"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
</table>
</div>
<div class="log-panel" id="log-panel"><div id="log-content"></div></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<div class="modal-header"><span id="modal-title">New Project</span><button onclick="closeModal()" style="background:none;border:none;font-size:20px">x</button></div>
<div class="modal-body">
<input type="hidden" id="edit-id">
<div class="form-group"><label>Name *</label><input id="f-name"></div>
<div class="form-group"><label>Repo URL *</label><input id="f-repo"></div>
<div class="form-group"><label>Branch</label><input id="f-branch" value="main"></div>
<div class="form-group"><label>Local Path *</label><input id="f-path"></div>
<div class="form-group"><label>Auth</label><select id="f-auth"><option value="none">None</option><option value="password">Password</option><option value="token">Token</option><option value="ssh_key">SSH Key</option></select></div>
<div class="form-group" id="creds-group" style="display:none"><label>Credentials</label><input id="f-creds" type="password"></div>
</div>
<div class="modal-footer">
<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
<button class="btn btn-primary" onclick="saveProject()">Save</button>
</div>
</div>
</div>

<script>
const API='http://localhost:8000';
async function loadProjects(){try{const r=await fetch(API+'/projects');if(!r.ok)throw new Error(r.status);render(await r.json())}catch(e){document.getElementById('list').innerHTML='<tr><td colspan="7" class="empty">Load failed: '+e.message+'</td></tr>'}}
function render(ps){const s=document.getElementById('summary');if(!ps.length){document.getElementById('list').innerHTML='<tr><td colspan="7" class="empty">No projects</td></tr>';return}document.getElementById('list').innerHTML=ps.map(p=>'<tr id="r'+p.id+'"><td><strong>'+esc(p.name)+'</strong></td><td>'+esc(p.repo_url)+'</td><td>'+esc(p.branch)+'</td><td>'+esc(p.local_path)+'</td><td><span class="status-badge status-'+(p.status||'idle')+'">'+(p.status||'idle')+'</span></td><td>'+(p.last_pull||'Never')+'</td><td class="actions"><button class="btn btn-primary btn-sm" onclick="pull('+p.id+')">Pull</button><button class="btn btn-secondary btn-sm" onclick="openModal('+p.id+')">Edit</button><button class="btn btn-danger btn-sm" onclick="del('+p.id+')">Del</button></td></tr>').join('')}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function openModal(id){document.getElementById('edit-id').value=id||'';document.getElementById('f-name').value='';document.getElementById('f-repo').value='';document.getElementById('f-branch').value='main';document.getElementById('f-path').value='';document.getElementById('f-auth').value='none';document.getElementById('f-creds').value='';document.getElementById('creds-group').style.display='none';document.getElementById('modal-title').textContent=id?'Edit':'New';if(id){fetch(API+'/projects/'+id).then(r=>r.json()).then(p=>{document.getElementById('f-name').value=p.name;document.getElementById('f-repo').value=p.repo_url;document.getElementById('f-branch').value=p.branch;document.getElementById('f-path').value=p.local_path;document.getElementById('f-auth').value=p.auth_type;if(p.auth_type!=='none'){document.getElementById('creds-group').style.display='block';document.getElementById('f-creds').value=p.credentials||''}})}document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('f-auth').onchange=function(){document.getElementById('creds-group').style.display=this.value!=='none'?'block':'none'}
document.getElementById('btn-add').onclick=()=>openModal();document.getElementById('btn-refresh').onclick=loadProjects
async function saveProject(){const id=document.getElementById('edit-id').value;const p={name:document.getElementById('f-name').value.trim(),repo_url:document.getElementById('f-repo').value.trim(),branch:document.getElementById('f-branch').value.trim()||'main',local_path:document.getElementById('f-path').value.trim(),auth_type:document.getElementById('f-auth').value,credentials:document.getElementById('f-creds').value};if(!p.name||!p.repo_url||!p.local_path){alert('Fill required');return}const r=await fetch((id?API+'/projects/'+id:API+'/projects'),{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});if(!r.ok){const e=await r.json().catch(()=>({}));alert('Failed: '+(e.detail||r.status));return}closeModal();loadProjects()}
async function del(id){if(!confirm('Delete?'))return;await fetch(API+'/projects/'+id,{method:'DELETE'});loadProjects()}
async function pull(id){log('Pulling #'+id);try{const r=await fetch(API+'/projects/'+id+'/pull',{method:'POST'});const d=await r.json();log(d.status==='success'?'OK: '+d.message:'Failed: '+d.message)}catch(e){log('Error: '+e.message)}loadProjects()}
function log(m){const p=document.getElementById('log-panel');p.classList.add('show');const d=document.createElement('div');d.textContent='['+new Date().toLocaleTimeString()+'] '+m;document.getElementById('log-content').appendChild(d);p.scrollTop=p.scrollHeight}
loadProjects()
</script>
</body>
</html>
