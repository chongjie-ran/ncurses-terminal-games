<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sokoban WASM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #eee;
  }
  h1 { color: #f0c040; margin-bottom: 8px; font-size: 24px; }
  #hud {
    display: flex;
    gap: 24px;
    margin-bottom: 8px;
    font-size: 14px;
    color: #aaa;
  }
  #hud span { color: #f0c040; }
  #canvas {
    border: 2px solid #444;
    background: #0f0f1a;
    image-rendering: pixelated;
  }
  #message {
    margin-top: 8px;
    font-size: 16px;
    height: 20px;
    color: #4f4;
  }
  #controls {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
  }
  #levels { margin-top: 8px; }
  #levels button {
    background: #333;
    color: #eee;
    border: 1px solid #555;
    padding: 4px 12px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 12px;
  }
  #levels button:hover { background: #555; }
</style>
</head>
<body>
<h1>SOKOBAN</h1>
<div id="hud">
  Level <span id="level">1</span>/<span id="total">8</span>
  &nbsp;|&nbsp;
  Moves <span id="moves">0</span>
  &nbsp;|&nbsp;
  Pushes <span id="pushes">0</span>
</div>
<canvas id="canvas"></canvas>
<div id="message"></div>
<div id="controls">Arrow Keys / WASD to move &nbsp;|&nbsp; R to restart &nbsp;|&nbsp; N for next level</div>
<div id="levels">
  <button onclick="restartLevel()">Restart</button>
  <button onclick="nextLevel()">Next Level</button>
</div>

<script src="sokoban.js"></script>
<script>
const CELL_FLOOR = 0, CELL_WALL = 1, CELL_BOX = 2, CELL_TARGET = 3,
      CELL_BOX_ON_TARGET = 4, CELL_PLAYER = 5, CELL_PLAYER_ON_TARGET = 6;

const CELL_SIZE = 36;
const COLORS = {
  [CELL_FLOOR]: '#1a1a2e',
  [CELL_WALL]: '#555577',
  [CELL_BOX]: '#c8a040',
  [CELL_TARGET]: '#2a4a2a',
  [CELL_BOX_ON_TARGET]: '#80ff80',
  [CELL_PLAYER]: '#4080ff',
  [CELL_PLAYER_ON_TARGET]: '#80ffcc',
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let Module = {};
let gw = 0, gh = 0;
let scale = 1;

function init() {
  Module._wasm_init(0);
  gw = Module._wasm_get_grid_width();
  gh = Module._wasm_get_grid_height();
  const total = Module._wasm_get_total_levels();
  document.getElementById('total').textContent = total;

  scale = Math.min(
    Math.floor(600 / gw),
    Math.floor(600 / gh),
    CELL_SIZE
  );
  canvas.width = gw * scale;
  canvas.height = gh * scale;

  document.addEventListener('keydown', onKey);
  canvas.addEventListener('click', onCanvasClick);
  tick();
}

function tick() {
  const state = Module._wasm_tick();
  updateHUD();
  draw();
  if (state === 1) {
    document.getElementById('message').textContent = 'LEVEL CLEAR! Press N for next level';
  }
  requestAnimationFrame(tick);
}

function updateHUD() {
  document.getElementById('level').textContent = Module._wasm_get_current_level() + 1;
  document.getElementById('moves').textContent = Module._wasm_get_moves();
  document.getElementById('pushes').textContent = Module._wasm_get_pushes();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < gh; y++) {
    for (let x = 0; x < gw; x++) {
      const cell = Module._wasm_get_cell(x, y);
      const px = x * scale, py = y * scale;

      ctx.fillStyle = COLORS[cell] || COLORS[CELL_FLOOR];
      ctx.fillRect(px, py, scale, scale);

      // Draw details
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.strokeRect(px, py, scale, scale);

      if (cell === CELL_WALL) {
        ctx.fillStyle = '#777799';
        ctx.fillRect(px + 2, py + 2, scale - 4, scale - 4);
      } else if (cell === CELL_TARGET) {
        ctx.fillStyle = '#3a6a3a';
        ctx.beginPath();
        ctx.arc(px + scale/2, py + scale/2, scale/4, 0, Math.PI * 2);
        ctx.fill();
      } else if (cell === CELL_BOX) {
        ctx.fillStyle = '#e0b850';
        ctx.fillRect(px + 3, py + 3, scale - 6, scale - 6);
        ctx.strokeStyle = '#a08030';
        ctx.strokeRect(px + 3, py + 3, scale - 6, scale - 6);
      } else if (cell === CELL_BOX_ON_TARGET) {
        ctx.fillStyle = '#a0ffa0';
        ctx.fillRect(px + 3, py + 3, scale - 6, scale - 6);
        ctx.strokeStyle = '#50c050';
        ctx.strokeRect(px + 3, py + 3, scale - 6, scale - 6);
        // Checkmark
        ctx.strokeStyle = '#208020';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px + scale*0.3, py + scale*0.5);
        ctx.lineTo(px + scale*0.45, py + scale*0.65);
        ctx.lineTo(px + scale*0.7, py + scale*0.35);
        ctx.stroke();
      } else if (cell === CELL_PLAYER) {
        ctx.fillStyle = '#60a0ff';
        ctx.beginPath();
        ctx.arc(px + scale/2, py + scale/2, scale/3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(px + scale*0.4, py + scale*0.4, scale/10, 0, Math.PI * 2);
        ctx.fill();
      } else if (cell === CELL_PLAYER_ON_TARGET) {
        ctx.fillStyle = '#80ffcc';
        ctx.beginPath();
        ctx.arc(px + scale/2, py + scale/2, scale/3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(px + scale*0.4, py + scale*0.4, scale/10, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function move(dx, dy) {
  Module._wasm_move(dx, dy);
}

function restartLevel() {
  Module._wasm_restart_wrapper();
  document.getElementById('message').textContent = '';
}

function nextLevel() {
  Module._wasm_next_level_wrapper();
  document.getElementById('message').textContent = '';
  gw = Module._wasm_get_grid_width();
  gh = Module._wasm_get_grid_height();
  scale = Math.min(Math.floor(600 / gw), Math.floor(600 / gh), CELL_SIZE);
  canvas.width = gw * scale;
  canvas.height = gh * scale;
}

function onKey(e) {
  switch(e.key) {
    case 'ArrowUp':    case 'w': case 'W': move(0, -1); break;
    case 'ArrowDown':  case 's': case 'S': move(0, 1);  break;
    case 'ArrowLeft':  case 'a': case 'A': move(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': move(1, 0);  break;
    case 'r': case 'R': restartLevel(); break;
    case 'n': case 'N': nextLevel(); break;
  }
}

function onCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const cx = Math.floor(mx / scale);
  const cy = Math.floor(my / scale);
  const px = Module._wasm_get_player_x();
  const py = Module._wasm_get_player_y();
  const dx = Math.sign(cx - px);
  const dy = Math.sign(cy - py);
  if (dx !== 0 || dy !== 0) {
    // Move toward clicked cell
    if (Math.abs(cx - px) >= Math.abs(cy - py)) {
      move(dx, 0);
    } else {
      move(0, dy);
    }
  }
}

SokobanModule().then(mod => {
  Module = mod;
  init();
});
</script>
</body>
</html>
