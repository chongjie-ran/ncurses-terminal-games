<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - WASM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  canvas {
    border: 2px solid #333;
    display: block;
    image-rendering: pixelated;
    cursor: pointer;
  }
  #controls {
    margin-top: 8px;
    color: #888;
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">SPACE / CLICK / TAP to flap</div>

<script>
var Module = {
  onRuntimeInitialized: function() {
    const best = parseInt(localStorage.getItem('flappy_best') || '0');
    Module._wasm_init(best);
    requestAnimationFrame(loop);
  }
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const SCREEN_W = Module._wasm_get_screen_w();
const SCREEN_H = Module._wasm_get_screen_h();
const GROUND_H = Module._wasm_get_ground_h();
const BIRD_RADIUS = Module._wasm_get_bird_radius();

canvas.width  = SCREEN_W;
canvas.height = SCREEN_H;

let lastTime = 0;

// Scale for HiDPI
const scaleX = canvas.width / canvas.offsetWidth;
const scaleY = canvas.height / canvas.offsetHeight;

// Pipe colors
const PIPE_GREEN = '#5fc035';

// Background layers (simple gradient sky)
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, SCREEN_H);
  grad.addColorStop(0, '#70c5ce');
  grad.addColorStop(1, '#c2e8bc');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
}

// Ground
function drawGround() {
  // Dirt
  ctx.fillStyle = '#ded895';
  ctx.fillRect(0, SCREEN_H - GROUND_H, SCREEN_W, GROUND_H);
  // Grass strip
  ctx.fillStyle = '#5fc035';
  ctx.fillRect(0, SCREEN_H - GROUND_H, SCREEN_W, 16);
  // Grass tufts
  ctx.fillStyle = '#4da829';
  for (let x = 0; x < SCREEN_W; x += 24) {
    ctx.fillRect(x, SCREEN_H - GROUND_H - 4, 8, 4);
  }
}

// Pipe
function drawPipe(x, gap_y, w, gap) {
  const top_h = gap_y;
  const bottom_y = gap_y + gap;
  const bottom_h = SCREEN_H - GROUND_H - bottom_y;

  // Top pipe (downward pointing cap)
  ctx.fillStyle = PIPE_GREEN;
  ctx.fillRect(x, 0, w, top_h);
  // Cap
  ctx.fillStyle = '#4da829';
  ctx.fillRect(x - 3, top_h - 26, w + 6, 26);
  ctx.fillStyle = '#5fc035';
  ctx.fillRect(x - 3, top_h - 26, w + 6, 8);

  // Bottom pipe
  ctx.fillStyle = PIPE_GREEN;
  ctx.fillRect(x, bottom_y, w, bottom_h);
  // Cap
  ctx.fillStyle = '#4da829';
  ctx.fillRect(x - 3, bottom_y, w + 6, 26);
  ctx.fillStyle = '#5fc035';
  ctx.fillRect(x - 3, bottom_y, w + 6, 8);
}

// Bird
function drawBird(x, y, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot * Math.PI / 180.0);

  // Body
  ctx.fillStyle = '#f7dc6f';
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_RADIUS, BIRD_RADIUS - 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  ctx.fillStyle = '#f4d03f';
  ctx.beginPath();
  ctx.ellipse(-2, 3, 8, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(5, -3, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(6, -3, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(BIRD_RADIUS - 2, 0);
  ctx.lineTo(BIRD_RADIUS + 6, 2);
  ctx.lineTo(BIRD_RADIUS - 2, 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// Score display
function drawScore(score, best) {
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('Score: ' + score, SCREEN_W / 2, 36);
  ctx.font = '16px Courier New';
  ctx.fillStyle = '#f7dc6f';
  ctx.fillText('Best: ' + best, SCREEN_W / 2, 58);
}

// Menu overlay
function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

  ctx.fillStyle = '#f7dc6f';
  ctx.font = 'bold 36px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('FLAPPY BIRD', SCREEN_W / 2, SCREEN_H / 2 - 60);

  ctx.fillStyle = '#fff';
  ctx.font = '18px Courier New';
  ctx.fillText('Click or SPACE to start', SCREEN_W / 2, SCREEN_H / 2);
}

// Game over overlay
function drawGameOver(score, best) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 32px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', SCREEN_W / 2, SCREEN_H / 2 - 50);

  ctx.fillStyle = '#fff';
  ctx.font = '20px Courier New';
  ctx.fillText('Score: ' + score, SCREEN_W / 2, SCREEN_H / 2);

  if (score >= best && score > 0) {
    ctx.fillStyle = '#f7dc6f';
    ctx.fillText('NEW BEST!', SCREEN_W / 2, SCREEN_H / 2 + 28);
  } else {
    ctx.fillText('Best: ' + best, SCREEN_W / 2, SCREEN_H / 2 + 28);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '16px Courier New';
  ctx.fillText('Click or SPACE to retry', SCREEN_W / 2, SCREEN_H / 2 + 70);
}

function render() {
  drawBackground();

  const PIPE_W = Module._wasm_get_pipe_width();
  const PIPE_GAP_I = Module._wasm_get_pipe_gap();
  const pipe_count = Module._wasm_get_pipe_count();

  for (let i = 0; i < pipe_count; i++) {
    const px = Module._wasm_get_pipe_x(i);
    const gap_y = Module._wasm_get_pipe_gap_y(i);
    drawPipe(px, gap_y, PIPE_W, PIPE_GAP_I);
  }

  drawGround();

  const bx = Module._wasm_get_bird_x();
  const by = Module._wasm_get_bird_y();
  const rot = Module._wasm_get_bird_rot();
  drawBird(bx, by, rot);

  const score = Module._wasm_get_score();
  const best = Module._wasm_get_best_score();
  drawScore(score, best);

  const state = Module._wasm_get_state();
  // 0=menu, 1=playing, 2=gameover
  if (state === 0) drawMenu();
  if (state === 2) drawGameOver(score, best);
}

function loop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  const state = Module._wasm_get_state();
  if (state === 1) {
    Module._wasm_update(dt);
  }

  render();
  requestAnimationFrame(loop);
}

// Input
function flap() {
  Module._wasm_jump();
  // Save best
  const score = Module._wasm_get_score();
  const best = Module._wasm_get_best_score();
  if (best > parseInt(localStorage.getItem('flappy_best') || '0')) {
    localStorage.setItem('flappy_best', best);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    flap();
  }
});

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  flap();
}, { passive: false });
</script>
<script src="flappy.js"></script>
</body>
</html>
