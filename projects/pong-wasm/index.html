<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong - WASM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; }
canvas { background: #000; border: 2px solid #333; display: block; }
#hud { color: #fff; font-size: 28px; margin-bottom: 10px; letter-spacing: 4px; }
#info { color: #555; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div id="hud"><span id="left">0</span><span id="sep"> : </span><span id="right">0</span></div>
<canvas id="c" width="640" height="480"></canvas>
<div id="info">W/S to move · SPACE start · R restart</div>
<script src="pong.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const leftEl = document.getElementById('left');
const rightEl = document.getElementById('right');

canvas.style.width = '480px';
canvas.style.height = '360px';

let game = null;
const keys = {};

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); if (game) game._wasm_launch(); }
    if (e.code === 'KeyR') { e.preventDefault(); if (game) { game._wasm_restart(); } }
    if (['ArrowUp','ArrowDown','KeyW','KeyS'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function drawCenterLine() {
    ctx.setLineDash([8, 8]);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(320, 0);
    ctx.lineTo(320, 480);
    ctx.stroke();
    ctx.setLineDash([]);
}

function drawText(text, x, y, size, color, align) {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px 'Courier New', monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
}

function renderMenu() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 640, 480);
    drawCenterLine();
    // Title
    drawText('PONG', 320, 100, 72, '#fff', 'center');
    drawText('PONG', 320, 98, 72, '#0ff', 'center');
    // Options
    drawText('1 PLAYER (vs AI)', 320, 240, 24, '#fff', 'center');
    drawText('2 PLAYERS', 320, 280, 24, '#aaa', 'center');
    drawText('W / S  or  ↑ / ↓', 320, 340, 16, '#444', 'center');
    drawText('SPACE to start', 320, 390, 18, '#666', 'center');
}

function render(state) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 640, 480);
    drawCenterLine();

    // Paddles
    ctx.fillStyle = '#0ff';
    ctx.fillRect(20, state.lpy, 10, 80);
    ctx.fillStyle = '#f0f';
    ctx.fillRect(610, state.rpy, 10, 80);

    // Ball
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(state.bx, state.by, state.br, 0, Math.PI * 2);
    ctx.fill();

    // Score
    leftEl.textContent = state.ls;
    rightEl.textContent = state.rs;
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(state.ls, 200, 60);
    ctx.fillStyle = '#f0f';
    ctx.fillText(state.rs, 440, 60);

    if (state.st === 2) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, 640, 480);
        drawText('POINT! SPACE to continue', 320, 240, 26, '#ff0', 'center');
    }
    if (state.st === 3) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, 640, 480);
        const w = state.ls >= 7 ? 'LEFT WINS!' : 'RIGHT WINS!';
        drawText(w, 320, 220, 36, '#0f0', 'center');
        drawText('SPACE rematch  ·  R menu', 320, 280, 18, '#888', 'center');
    }
}

PongModule().then(mod => {
    game = mod;
    game._wasm_init();

    function loop() {
        if (!game) return;

        const dir = (keys['KeyW'] || keys['ArrowUp']) ? -1 : (keys['KeyS'] || keys['ArrowDown']) ? 1 : 0;
        if (dir !== 0) game._wasm_paddle_move(0, dir);

        game._wasm_update(16.67);

        const st = game._wasm_get_state();
        if (st === 0) {
            renderMenu();
        } else {
            render({
                st,
                ls: game._wasm_get_left_score(),
                rs: game._wasm_get_right_score(),
                bx: game._wasm_get_ball_x(),
                by: game._wasm_get_ball_y(),
                br: game._wasm_get_ball_radius(),
                lpy: game._wasm_get_paddle_y(0),
                rpy: game._wasm_get_paddle_y(1),
            });
        }

        requestAnimationFrame(loop);
    }
    loop();
});
</script>
</body>
</html>
