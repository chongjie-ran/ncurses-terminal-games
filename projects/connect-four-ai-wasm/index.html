<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connect Four vs AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; color: #fff; }
#app { text-align: center; }
h1 { margin-bottom: 10px; color: #e94560; font-size: 2em; }
#status { font-size: 1.2em; margin-bottom: 10px; height: 24px; color: #ffd700; }
#canvas { cursor: pointer; border-radius: 8px; box-shadow: 0 0 20px rgba(233,69,96,0.3); }
.menu { margin: 20px 0; }
.menu button { padding: 12px 24px; margin: 5px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: #e94560; color: #fff; transition: all 0.2s; }
.menu button:hover { background: #ff6b8a; transform: scale(1.05); }
.menu button.ai-btn { background: #4ecca3; }
.menu button.ai-btn:hover { background: #7ee8c7; }
.diff-btn { background: #16213e !important; border: 2px solid #4ecca3 !important; }
.diff-btn:hover { background: #1f3460 !important; }
</style>
</head>
<body>
<div id="app">
<h1>Connect Four</h1>
<div id="status">Loading...</div>
<div class="menu" id="menu">
  <button onclick="startGame(0)">2 Players</button><br>
  <button class="ai-btn" onclick="showDiff()">vs AI</button>
  <div id="diffMenu" style="display:none; margin-top:10px;">
    <button class="diff-btn" onclick="startAI(1)">Easy</button>
    <button class="diff-btn" onclick="startAI(2)">Medium</button>
    <button class="diff-btn" onclick="startAI(3)">Hard</button>
  </div>
</div>
<canvas id="canvas" width="490" height="420" style="display:none"></canvas>
</div>
<script>
var CELL = 70;
var Module = null;
var gameLoaded = false;
var gameReady = false;
var aiMode = 0;

function initGame() {
  Module = Connect4AIModule({ totalMemory: 64 * 1024 * 1024 });
  Module.then(function(M) {
    Module = M;
    gameLoaded = true;
    document.getElementById('status').textContent = 'Choose game mode';
  });
}
</script>
<script src="connect4ai.js" onload="initGame()"></script>
<script>
function showDiff() { document.getElementById('diffMenu').style.display = 'block'; }

function startGame(mode) {
  if (!gameLoaded) return;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('canvas').style.display = 'block';
  aiMode = mode;
  gameReady = true;
  Module._cf_init_game();
  Module._cf_start_game();
  draw();
}

function startAI(diff) {
  if (!gameLoaded) return;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('canvas').style.display = 'block';
  aiMode = 1;
  gameReady = true;
  Module._cf_init_game();
  Module._cf_start_game_ex(1, diff);
  draw();
}

function draw() {
  if (!gameReady) return;
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var COLS = 7, ROWS = 6;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#16213e';
  ctx.beginPath();
  ctx.roundRect(0, 0, COLS * CELL, ROWS * CELL, 8);
  ctx.fill();
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var x = c * CELL + CELL / 2, y = r * CELL + CELL / 2;
      ctx.beginPath();
      ctx.arc(x, y, CELL / 2 - 6, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1a2e';
      ctx.fill();
      var v = Module._cf_get_cell(r, c);
      if (v === 1) drawDisc(ctx, x, y, '#e94560');
      else if (v === 2) drawDisc(ctx, x, y, '#ffd700');
    }
  }
  if (Module._cf_get_state() === 2 && Module._cf_get_winner() !== 3) {
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(Module._cf_get_win_x1() * CELL + CELL / 2, Module._cf_get_win_y1() * CELL + CELL / 2);
    ctx.lineTo(Module._cf_get_win_x2() * CELL + CELL / 2, Module._cf_get_win_y2() * CELL + CELL / 2);
    ctx.stroke();
  }
  document.getElementById('status').textContent = getStatus();
}

function drawDisc(ctx, x, y, color) {
  var grad = ctx.createRadialGradient(x - 5, y - 5, 2, x, y, CELL / 2 - 8);
  grad.addColorStop(0, color);
  grad.addColorStop(1, shadeColor(color, -30));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, CELL / 2 - 8, 0, Math.PI * 2);
  ctx.fill();
}

function shadeColor(c, pct) {
  var r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
  r = Math.max(0,Math.min(255,Math.round(r*(1+pct/100))));
  g = Math.max(0,Math.min(255,Math.round(g*(1+pct/100))));
  b = Math.max(0,Math.min(255,Math.round(b*(1+pct/100))));
  return '#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
}

function getStatus() {
  var state = Module._cf_get_state();
  if (state === 0) return "Menu";
  if (state === 2) {
    var w = Module._cf_get_winner();
    if (w === 1) return "Red Wins!";
    if (w === 2) return aiMode ? "AI Wins!" : "Yellow Wins!";
    if (w === 3) return "Draw!";
  }
  var player = Module._cf_get_player();
  return (player === 1 ? "Red" : (aiMode ? "AI" : "Yellow")) + "'s Turn";
}

document.getElementById('canvas').addEventListener('click', function(e) {
  if (!gameReady || Module._cf_get_state() !== 1) return;
  if (aiMode && Module._cf_get_player() === 2) return;
  var rect = this.getBoundingClientRect();
  var col = Math.floor((e.clientX - rect.left) / CELL);
  if (col >= 0 && col < 7 && Module._cf_can_drop(col)) {
    Module._cf_drop_disc(col);
    draw();
    if (aiMode && Module._cf_get_state() === 1 && Module._cf_get_player() === 2) {
      setTimeout(function() { Module._cf_ai_move(); draw(); }, 300);
    }
  }
});
</script>
</body>
</html>
