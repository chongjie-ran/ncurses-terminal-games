name: CI/CD - Power Broker WASM

on:
  push:
    branches: [main]
    paths:
      - 'games/power-broker-wasm/**'
  pull_request:
    paths:
      - 'games/power-broker-wasm/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile & Run C unit tests
        working-directory: games/power-broker-wasm
        run: |
          gcc -o game_test game_test.c game.c -lm -O0
          ./game_test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git emsdk
          cd emsdk
          ./emsdk install 3.1.51
          ./emsdk activate 3.1.51

      - name: Build WASM
        working-directory: games/power-broker-wasm
        env:
          EMSDK: ${{ github.workspace }}/emsdk
        run: |
          export PATH="${{ env.EMSDK }}:$PATH"
          emcc --version
          emcc -c game.c -o game.o -O3
          emcc -c wasm_main.c -o wasm_main.o -O3
          emcc game.o wasm_main.o -o power_broker.js -s WASM=1 \
            -s 'EXPORTED_FUNCTIONS=["_wasm_init","_wasm_new_game","_wasm_get_state","_wasm_get_day","_wasm_get_cash","_wasm_get_power","_wasm_get_price","_wasm_get_profit","_wasm_get_total_assets","_wasm_get_win_streak","_wasm_is_boss_day","_wasm_get_ach_count","_wasm_get_ach_unlocked","_wasm_get_event_name","_wasm_get_event_desc","_wasm_get_event_impact","_wasm_player_action","_wasm_end_day","_wasm_return_to_menu"]' \
            -s ALLOW_MEMORY_GROWTH=1 -s INITIAL_MEMORY=16MB -s MODULARIZE=0 -s STRICT=0 -s RESERVED_FUNCTION_POINTERS=20
          rm -f game.o wasm_main.o
          ls -lh power_broker.wasm power_broker.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: power-broker-build
          path: |
            games/power-broker-wasm/index.html
            games/power-broker-wasm/power_broker.wasm
            games/power-broker-wasm/power_broker.js
          retention-days: 7

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: power-broker-build
          path: dist

      - name: Smoke test - file integrity
        run: |
          echo "=== Artifact validation ==="
          test -f dist/index.html && echo "✓ index.html ($(wc -c < dist/index.html) bytes)"
          test -f dist/power_broker.wasm && echo "✓ power_broker.wasm"
          test -f dist/power_broker.js && echo "✓ power_broker.js"
          
          SIZE=$(stat -c%s dist/power_broker.wasm)
          echo "WASM size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then echo "ERROR: WASM too small"; exit 1; fi
          if [ "$SIZE" -gt 10485760 ]; then echo "ERROR: WASM too large"; exit 1; fi
          echo "✓ WASM size valid (1KB - 10MB)"
          
          node -e "
            const fs = require('fs');
            const js = fs.readFileSync('dist/power_broker.js', 'utf8');
            if (!js.includes('WebAssembly')) { console.error('No WebAssembly ref'); process.exit(1); }
            if (!js.includes('_wasm_new_game')) { console.error('No game exports'); process.exit(1); }
            console.log('✓ JS validates WASM exports');
            if (!js.includes('power_broker.wasm')) { console.error('No WASM file ref'); process.exit(1); }
            console.log('✓ JS references correct WASM filename');
          "
          
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('dist/index.html', 'utf8');
            if (!html.includes('power_broker.js')) { console.error('No JS ref in HTML'); process.exit(1); }
            if (!html.includes('算力经纪人')) { console.error('Missing game title'); process.exit(1); }
            console.log('✓ HTML validates game structure');
          "
          
          echo ""
          echo "=== All smoke tests PASSED ==="

  deploy:
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: power-broker-build
          path: .

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
