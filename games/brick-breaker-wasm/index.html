<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker WASM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameCanvas {
            border: 2px solid #4A9FFF;
            border-radius: 4px;
            background: #0f0f1a;
        }
        #info {
            color: #888;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div>
        <canvas id="gameCanvas" width="480" height="640"></canvas>
        <div id="info">Arrow Keys or Mouse to move paddle | Click to restart</div>
    </div>
    
    <script>
        var Module = {};
    </script>
    <script src="brick_breaker.js"></script>
    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        
        var colors = [
            'rgb(255,60,60)',
            'rgb(255,140,60)',
            'rgb(255,220,60)',
            'rgb(60,200,100)',
            'rgb(60,140,255)',
            'rgb(180,60,255)'
        ];
        
        function drawBrick(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(x, y, w, 3);
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(x, y + h - 2, w, 2);
        }
        
        function gameLoop() {
            if (!Module._update_game) return;
            
            Module._update_game();
            
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            var brickW = Module._get_brick_w();
            var brickH = Module._get_brick_h();
            var brickGap = Module._get_brick_gap();
            var brickTop = Module._get_brick_top();
            
            for (var r = 0; r < 6; r++) {
                for (var c = 0; c < 8; c++) {
                    if (Module._is_brick_alive(r, c)) {
                        var bx = c * (brickW + brickGap) + brickGap;
                        var by = brickTop + r * (brickH + brickGap);
                        var colorIdx = Module._get_brick_color(r, c);
                        drawBrick(bx, by, brickW, brickH, colors[colorIdx]);
                    }
                }
            }
            
            var px = Module._get_paddle_x();
            var pw = Module._get_paddle_w();
            var ph = Module._get_paddle_h();
            ctx.fillStyle = '#4A9FFF';
            ctx.fillRect(px - pw / 2, 640 - 40 - ph / 2, pw, ph);
            
            var bx = Module._get_ball_x();
            var by = Module._get_ball_y();
            var br = Module._get_ball_r();
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(bx, by, br, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '18px Arial';
            ctx.fillText('Score: ' + Module._get_score(), 10, 20);
            ctx.fillText('Lives: ' + Module._get_lives(), 380, 20);
            
            if (Module._is_game_over()) {
                ctx.fillStyle = '#FF4444';
                ctx.font = '32px Arial';
                ctx.fillText('GAME OVER', 140, 300);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText('Click to restart', 160, 340);
            }
            
            if (Module._is_game_won()) {
                ctx.fillStyle = '#44FF44';
                ctx.font = '32px Arial';
                ctx.fillText('YOU WIN!', 160, 300);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText('Click to restart', 160, 340);
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        Module.onRuntimeInitialized = function() {
            Module._restart();
            requestAnimationFrame(gameLoop);
        };
        
        document.addEventListener('keydown', function(e) {
            if (!Module._restart) return;
            if (e.key === 'ArrowLeft') Module._set_key(1, 1);
            if (e.key === 'ArrowRight') Module._set_key(2, 1);
        });
        document.addEventListener('keyup', function(e) {
            if (!Module._restart) return;
            if (e.key === 'ArrowLeft') Module._set_key(1, 0);
            if (e.key === 'ArrowRight') Module._set_key(2, 0);
        });
        
        canvas.addEventListener('mousemove', function(e) {
            if (!Module._restart) return;
            var rect = canvas.getBoundingClientRect();
            var x = (e.clientX - rect.left) * (canvas.width / rect.width);
            Module._set_paddle_x(x);
        });
        
        canvas.addEventListener('touchmove', function(e) {
            if (!Module._restart) return;
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
            Module._set_paddle_x(x);
        }, { passive: false });
        
        canvas.addEventListener('click', function() {
            if (!Module._restart) return;
            if (Module._is_game_over() || Module._is_game_won()) Module._restart();
        });
    </script>
</body>
</html>
