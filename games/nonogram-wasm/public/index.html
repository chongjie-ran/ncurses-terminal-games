<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonogram/Picross WASM</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Courier New,monospace;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;color:#eee}
        h1{font-size:2rem;margin-bottom:10px;color:#00d9ff;text-shadow:0 0 10px rgba(0,217,255,0.5)}
        .info{margin-bottom:15px;font-size:1.1rem;color:#aaa}
        .info span{color:#00d9ff}
        #gameCanvas{border:3px solid #00d9ff;border-radius:8px;cursor:pointer;box-shadow:0 0 20px rgba(0,217,255,0.3)}
        .controls{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
        button{padding:10px 20px;font-size:1rem;font-family:inherit;border:none;border-radius:5px;cursor:pointer;transition:all 0.2s}
        .btn-primary{background:#00d9ff;color:#1a1a2e}
        .btn-primary:hover{background:#00b8d9;transform:scale(1.05)}
        .btn-secondary{background:#333;color:#fff}
        .btn-secondary:hover{background:#444}
        .instructions{margin-top:15px;padding:15px;background:rgba(0,0,0,0.3);border-radius:8px;max-width:600px;text-align:left}
        .instructions h3{color:#00d9ff;margin-bottom:8px}
        .instructions p{color:#aaa;line-height:1.5}
        .mode-indicator{margin-top:10px;padding:8px 15px;background:rgba(0,217,255,0.2);border-radius:5px;font-weight:bold}
    </style>
</head>
<body>
    <h1>Nonogram / Picross</h1>
    <div class="info">Puzzle: <span id="puzzleNum">0</span> | <span id="gridSize">5x5</span></div>
    <div class="mode-indicator">Mode: <span id="modeDisplay">Fill (Left Click)</span></div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <button class="btn-primary" onclick="prevPuzzle()">Prev</button>
        <button class="btn-primary" onclick="nextPuzzle()">Next</button>
        <button class="btn-secondary" onclick="toggleMode()">Switch Mode</button>
        <button class="btn-secondary" onclick="clearGrid()">Clear</button>
    </div>
    <div class="instructions">
        <h3>How to Play</h3>
        <p>Fill cells based on number hints. Numbers indicate consecutive filled cells.<br>Left Click: Fill/Unfill | Right Click: Mark X<br>M: Toggle Mode | C: Clear | Arrows: Change Puzzle</p>
    </div>
    <script>
const canvas=document.getElementById("gameCanvas"),ctx=canvas.getContext("2d");
let gs={rows:5,cols:5,cell:40,pad:100,grid:[],solution:[],rowHints:[],colHints:[],done:false,puzzleId:0},mode="fill";
function genPuzzle(id){
const sizes=[[5,5],[7,7],[10,10],[10,15],[15,15]],idx=id%5,[rows,cols]=sizes[idx];
gs.rows=rows;gs.cols=cols;gs.cell=rows<=10?40:30;gs.pad=100;gs.puzzleId=id;gs.done=false;
gs.grid=Array(rows).fill().map(()=>Array(cols).fill(0));
gs.solution=Array(rows).fill().map(()=>Array(cols).fill(0));
const seed=id*12345,rand=n=>Math.abs(Math.sin(seed+n)*10000)%3;
for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(rand(r*100+c)===0||(r===0&&c<3))gs.solution[r][c]=1;
for(let r=0;r<rows;r++){let start=rand(r*50)%2,len=Math.floor(cols/2)+rand(r*77)%Math.floor(cols/2);for(let c=start;c<start+len&&c<cols;c++)gs.solution[r][c]=1;}
gs.rowHints=[];gs.colHints=[];
for(let r=0;r<rows;r++){const h=[];let cnt=0;for(let c=0;c<cols;c++){if(gs.solution[r][c]===1)cnt++;else if(cnt>0){h.push(cnt);cnt=0;}}if(cnt>0)h.push(cnt);gs.rowHints[r]=h.length?h:[0];}
for(let c=0;c<cols;c++){const h=[];let cnt=0;for(let r=0;r<rows;r++){if(gs.solution[r][c]===1)cnt++;else if(cnt>0){h.push(cnt);cnt=0;}}if(cnt>0)h.push(cnt);gs.colHints[c]=h.length?h:[0];}
canvas.width=gs.pad*2+gs.cols*gs.cell;canvas.height=gs.pad*2+gs.rows*gs.cell;
document.getElementById("puzzleNum").textContent=id;document.getElementById("gridSize").textContent=cols+"x"+rows;}
function draw(){const{rows,cols,cell,pad,grid,solution,rowHints,colHints}=gs;
ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0d1521";ctx.fillRect(0,0,pad,canvas.height);ctx.fillRect(0,0,canvas.width,pad);
ctx.fillStyle="#fff";ctx.font="bold 14px Courier New";ctx.textAlign="center";
const maxColHint=Math.max(...colHints.map(h=>h.length)),hintHeight=pad/maxColHint;
for(let c=0;c<cols;c++){const x=pad+c*cell+cell/2;for(let h=0;h<colHints[c].length;h++){const y=pad-(colHints[c].length-h)*hintHeight+hintHeight/2+5;ctx.fillText(colHints[c][h],x,y);}}
ctx.textAlign="right";
for(let r=0;r<rows;r++){const y=pad+r*cell+cell/2+5;for(let h=0;h<rowHints[r].length;h++){const x=pad-(rowHints[r].length-h)*20-5;ctx.fillText(rowHints[r][h],x,y);}}
for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const x=pad+c*cell,y=pad+r*cell;
ctx.fillStyle="#2a2a4e";ctx.fillRect(x+1,y+1,cell-2,cell-2);
const val=grid[r]?grid[r][c]:0;
if(val===1){ctx.fillStyle="#00d9ff";ctx.fillRect(x+3,y+3,cell-6,cell-6);}
else if(val===2){ctx.strokeStyle="#ff6b6b";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+5,y+5);ctx.lineTo(x+cell-5,y+cell-5);ctx.moveTo(x+cell-5,y+5);ctx.lineTo(x+5,y+cell-5);ctx.stroke();}}
ctx.strokeStyle="#444";ctx.lineWidth=1;
for(let c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(pad+c*cell,pad);ctx.lineTo(pad+c*cell,pad+rows*cell);ctx.stroke();}
for(let r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(pad,pad+r*cell);ctx.lineTo(pad+cols*cell,pad+r*cell);ctx.stroke();}
ctx.strokeStyle="#00d9ff";ctx.lineWidth=3;ctx.strokeRect(pad,pad,cols*cell,rows*cell);
if(!gs.done&&grid.length>0){let complete=true;for(let r=0;r<rows&&complete;r++)for(let c=0;c<cols&&complete;c++)if(grid[r][c]!==solution[r][c])complete=false;if(complete){gs.done=true;setTimeout(()=>alert("Puzzle Complete!"),10);}}}
function handleClick(e,isRight){const rect=canvas.getBoundingClientRect(),x=e.clientX-rect.left,y=e.clientY-rect.top,{rows,cols,cell,pad}=gs;
if(x>=pad&&y>=pad&&x<pad+cols*cell&&y<pad+rows*cell){const c=Math.floor((x-pad)/cell),r=Math.floor((y-pad)/cell);
if(isRight||mode==="mark")gs.grid[r][c]=gs.grid[r][c]===2?0:2;else gs.grid[r][c]=(gs.grid[r][c]+1)%3;draw();}}
canvas.addEventListener("click",e=>handleClick(e,false));canvas.addEventListener("contextmenu",e=>{e.preventDefault();handleClick(e,true);});
function loadPuzzle(id){genPuzzle(id);draw();}function prevPuzzle(){loadPuzzle(gs.puzzleId-1);}function nextPuzzle(){loadPuzzle(gs.puzzleId+1);}
function toggleMode(){mode=mode==="fill"?"mark":"fill";document.getElementById("modeDisplay").textContent=mode==="fill"?"Fill (Left Click)":"Mark X (Left Click)";}
function clearGrid(){for(let r=0;r<gs.rows;r++)for(let c=0;c<gs.cols;c++)gs.grid[r][c]=0;gs.done=false;draw();}
document.addEventListener("keydown",e=>{if(e.key==="m"||e.key==="M")toggleMode();if(e.key==="c"||e.key==="C")clearGrid();if(e.key==="ArrowLeft")prevPuzzle();if(e.key==="ArrowRight")nextPuzzle();});
genPuzzle(0);draw();
    </script>
</body>
</html>
