name: CI/CD - Power Broker WASM

on:
  push:
    branches: [main]
    paths:
      - 'games/power-broker-wasm/**'
      - '.github/workflows/power-broker-cicd.yml'
  pull_request:
    paths:
      - 'games/power-broker-wasm/**'
      - '.github/workflows/power-broker-cicd.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-power-broker
  cancel-in-progress: true

env:
  EMSDK_VERSION: 3.1.51

jobs:
  test-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run C unit tests
        run: |
          cd games/power-broker-wasm
          gcc -o game_test game_test.c game.c -lm -O0 && ./game_test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Setup Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git emsdk
          cd emsdk && ./emsdk install ${{ env.EMSDK_VERSION }} && ./emsdk activate ${{ env.EMSDK_VERSION }}
      - name: Build WASM
        run: |
          source emsdk/emsdk_env.sh
          cd games/power-broker-wasm
          ./build.sh
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: power-broker-build
          path: |
            games/power-broker-wasm/index.html
            games/power-broker-wasm/power_broker.wasm
            games/power-broker-wasm/power_broker.js
          retention-days: 7

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: power-broker-build
          path: dist
      - name: Smoke test
        run: |
          echo "=== Artifact validation ==="
          test -f dist/index.html && echo "OK index.html"
          test -f dist/power_broker.wasm && echo "OK power_broker.wasm"
          test -f dist/power_broker.js && echo "OK power_broker.js"
          SIZE=$(stat -c%s dist/power_broker.wasm)
          echo "WASM size: $SIZE"
          if [ "$SIZE" -lt 1000 ] || [ "$SIZE" -gt 10485760 ]; then exit 1; fi
          node -e "const fs=require('fs'); const j=fs.readFileSync('dist/power_broker.js','utf8'); if(!j.includes('WebAssembly'))process.exit(1); if(!j.includes('_wasm_new_game'))process.exit(1); console.log('OK JS')"
          node -e "const fs=require('fs'); const h=fs.readFileSync('dist/index.html','utf8'); if(!h.includes('power_broker.js'))process.exit(1); if(!h.includes('算力经纪人'))process.exit(1); console.log('OK HTML')"
          echo "=== ALL PASSED ==="

  deploy:
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: power-broker-build
          path: dist
      - name: Deploy to GitHub Pages subdirectory
        uses: actions/configure-pages@v5
      - name: Create subdirectory
        run: mkdir -p _games/power-broker && cp dist/* _games/power-broker/
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _games/power-broker
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
