name: CI/CD - WASM Games (Unified)

on:
  push:
    branches: [main]
    paths:
      - 'games/power-broker-wasm/**'
      - 'games/model-league-wasm/**'
      - '.github/workflows/wasm-games-cicd.yml'
  pull_request:
    paths:
      - 'games/power-broker-wasm/**'
      - 'games/model-league-wasm/**'
      - '.github/workflows/wasm-games-cicd.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-wasm-games
  cancel-in-progress: true

env:
  EMSDK_VERSION: 3.1.51

jobs:
  test-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run C unit tests
        run: |
          echo "=== Power Broker tests ==="
          cd games/power-broker-wasm
          gcc -o game_test game_test.c game.c -lm -O0 && ./game_test
          echo "=== Model League tests ==="
          cd ../model-league-wasm
          if [ -f game_test.c ]; then
            gcc -o model_league_test game_test.c game.c -lm -O0 && ./model_league_test
          fi

  build:
    needs: test-native
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git emsdk
          cd emsdk && ./emsdk install ${{ env.EMSDK_VERSION }} && ./emsdk activate ${{ env.EMSDK_VERSION }}

      - name: Build Power Broker WASM
        run: |
          source emsdk/emsdk_env.sh
          cd games/power-broker-wasm && ./build.sh

      - name: Build Model League WASM
        run: |
          source emsdk/emsdk_env.sh
          cd games/model-league-wasm && ./build.sh

      - name: Organize artifact
        run: |
          mkdir -p _site/power-broker _site/model-league
          cp games/power-broker-wasm/index.html games/power-broker-wasm/power_broker.wasm games/power-broker-wasm/power_broker.js _site/power-broker/
          cp games/model-league-wasm/index.html games/model-league-wasm/model_league.wasm games/model-league-wasm/model_league.js _site/model-league/
          # Root index.html lists all games
          cat > _site/index.html << 'HTML'
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>WASM Games</title>
<style>
body { background: #0a0a12; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
h1 { color: #00d4ff; margin-bottom: 32px; }
.games { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.card { background: #12121e; border: 1px solid #333; border-radius: 12px; padding: 24px; min-width: 200px; text-align: center; }
.card h2 { color: #00d4ff; margin: 0 0 8px; }
.card p { color: #888; margin: 0 0 16px; font-size: 14px; }
.card a { background: #003a50; color: #00d4ff; border: 1px solid #00d4ff; padding: 10px 24px; border-radius: 6px; text-decoration: none; display: inline-block; }
.card a:hover { background: #004a60; }
</style>
</head>
<body>
<h1>🎮 WASM Games</h1>
<div class="games">
  <div class="card">
    <h2>算力经纪人</h2>
    <p>Power Broker</p>
    <a href="/ncurses-terminal-games/power-broker/">▶ 立即游戏</a>
  </div>
  <div class="card">
    <h2>模型联盟</h2>
    <p>Model League</p>
    <a href="/ncurses-terminal-games/model-league/">▶ 立即游戏</a>
  </div>
</div>
</body>
</html>
HTML

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        run: |
          echo "CI deployment triggered successfully"
          echo "Games will be available at:"
          echo "  /power-broker/ (算力经纪人)"
          echo "  /model-league/ (模型联盟)"
          echo "=== CI Pipeline PASSED ==="
